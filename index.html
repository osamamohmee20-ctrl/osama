<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE ACCESS | Dx1337</title>
    <style>
        body { margin: 0; background: #000; color: #ff0000; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        /* جعل الأوفرلي يغطي كل شيء ويستجيب للضغط */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #00d4ff; font-size: 1.5rem; letter-spacing: 2px; }
        .text-container { font-size: 1.8rem; max-width: 80%; text-align: center; line-height: 1.5; color: #ff0000; }
        #content-wrapper { display: none; flex-direction: column; align-items: center; }
        #masons-img { width: 350px; opacity: 0; transition: opacity 2s ease-in; filter: grayscale(1) brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(10) contrast(1.5); }
        .footer-text { margin-top: 30px; opacity: 0; transition: opacity 2s ease-in; color: #ff0000; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="overlay" onclick="initialize()">[ CLICK TO INITIALIZE SYSTEM ]</div>
    
    <div class="text-container" id="typewriter"></div>

    <div id="content-wrapper">
        <img src="masons.jpg" id="masons-img">
        <div class="footer-text" id="footer">This website was created by Osama</div>
    </div>

    <script>
        // استخدام الصوت المدمج (لضمان عمله في iOS)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.1;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        const text = "This website is used for cybersecurity purposes, so please be careful when using it.";
        const container = document.getElementById('typewriter');

        function initialize() {
            // 1. طلب ملء الشاشة فوراً
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
            
            // 2. إخفاء الأوفرلي
            document.getElementById('overlay').style.display = 'none';
            
            // 3. بدء الكتابة فوراً
            typeWriter(0);
        }

        function typeWriter(i) {
            if (i < text.length) {
                container.innerHTML += text.charAt(i);
                playClick();
                setTimeout(() => typeWriter(i + 1), 60); 
            } else {
                setTimeout(showLogo, 5000);
            }
        }

        function showLogo() {
            container.style.display = 'none';
            document.getElementById('content-wrapper').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('masons-img').style.opacity = '1';
                document.getElementById('footer').style.opacity = '1';
            }, 100);
        }
    </script>
</body>
</html>
