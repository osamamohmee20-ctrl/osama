<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>DWLH | SYSTEM SECURED BY OSAMA</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            background-color: #000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* تأثير Matrix باللون الأحمر */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.2;
        }

        .container {
            position: relative;
            z-index: 2;
            padding: 40px;
            border: 2px solid #ff0000;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 30px #ff0000;
            width: 85%;
            max-width: 650px;
            transition: all 0.8s ease-in-out; /* انتقال ناعم */
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(2deg); text-shadow: 2px 0 #fff; }
            50% { transform: skew(-2deg); text-shadow: -2px 0 #ff0000; }
            100% { transform: skew(0deg); }
        }

        /* زر TRY AGAIN */
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            border: 2px solid #ff0000;
            background: transparent;
            color: #ff0000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            font-family: inherit;
        }

        .btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        /* الكونسول (سجلات النظام) */
        #console {
            display: none;
            text-align: left;
            margin-top: 20px;
            font-size: 0.9rem;
            height: 200px;
            overflow-y: hidden;
            border-top: 1px solid #440000;
            padding-top: 15px;
        }

        /* روابط التواصل الاجتماعي */
        #socials {
            display: none;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transition: opacity 1s;
        }

        .social-btn {
            text-decoration: none;
            color: #fff;
            border: 1px solid #ff0000;
            padding: 12px;
            background: rgba(255, 0, 0, 0.1);
            transition: 0.3s;
        }

        .social-btn:hover {
            background: rgba(255, 0, 0, 0.4);
            transform: scale(1.05);
        }

        .fade-out { opacity: 0; transform: scale(0.9); }
        .fade-in { opacity: 1 !important; display: flex !important; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<audio id="hackerAudio">

<script>
    // --- Matrix Effect ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "01010101010101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000";
        ctx.font = fontSize + "px arial";
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);

    // --- Hack Logic ---
    const logs = [
        "> BYPASSING FIREWALL...",
        "> INJECTING EXPLOIT...",
        "> ACCESSING SYSTEM FILES...",
        "> STEALING BROWSER COOKIES...",
        "> UPLOADING PERSONAL DATA...",
        "> DISCONNECTING SECURITY...",
        "> ENCRYPTING DRIVE C:/"
    ];

    function startHack() {
        // تشغيل الصوت
        document.getElementById('hackerAudio').play();
        
        // إخفاء المرحلة الأولى مع انتقال
        const p1 = document.getElementById('phase1');
        p1.classList.add('fade-out');
        
        setTimeout(() => {
            p1.style.display = 'none';
            const consoleBox = document.getElementById('console');
            consoleBox.style.display = 'block';
            runLogs(0);
        }, 800);
    }

    function runLogs(index) {
        if (index < logs.length) {
            const consoleBox = document.getElementById('console');
            consoleBox.innerHTML += `<p>${logs[index]}</p>`;
            setTimeout(() => runLogs(index + 1), 600);
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('console').style.display = 'none';
        const socials = document.getElementById('socials');
        socials.classList.add('fade-in');
    }
</script>
