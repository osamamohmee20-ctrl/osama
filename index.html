<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE ACCESS </title>
    <style>
        body { margin: 0; background: #000; color: #ff0000; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #00d4ff; letter-spacing: 3px; }
        .text-container { font-size: 1.8rem; max-width: 80%; text-align: center; line-height: 1.5; color: #ff0000; }
        
        /* الصورة مثبتة في المنتصف تماماً */
        #content-wrapper { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; position: relative; flex-direction: column; }
        #masons-img { width: 350px; opacity: 0; transition: opacity 2s ease-in; filter: grayscale(1) brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(10) contrast(1.5); }
        
        /* الروابط مثبتة على يمين الصورة */
        #social-links { position: absolute; right: 15%; display: flex; flex-direction: column; gap: 30px; }
        
        /* تأثيرات الـ Hover المحدثة للروابط */
        .social-link { 
            color: #ff0000; /* اللون الأساسي أحمر */
            text-decoration: none; 
            font-size: 1.5rem; 
            transition: all 0.3s ease-in-out; /* حركة سلسة */
            display: inline-block; /* ضروري لتأثير التكبير */
        }
        
        .social-link:hover { 
            color: #00d4ff; /* يتغير للأزرق اللبني عند وضع الماوس */
            transform: scale(1.1); /* يكبر بنسبة 10% */
            text-decoration: underline; /* يظهر خط تحته */
        }
        
        /* جملة التوقيع مرفوعة للأعلى */
        .footer-text { position: absolute; bottom: 80px; /* رفعناها للأعلى (كانت 30px) */ opacity: 0; transition: opacity 2s ease-in; color: #ff0000; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="overlay" onclick="initialize()">[ CLICK TO INITIALIZE SYSTEM ]</div>
    
    <div class="text-container" id="typewriter"></div>

    <div id="content-wrapper">
        <img src="masons.jpg" id="masons-img">
        
        <div id="social-links">
            <a href="https://www.tiktok.com/@9a2o" target="_blank" class="social-link">TikTok</a>
            <a href="https://www.youtube.com/@%D8%B4%D8%B7%D8%AD%D9%87-1" target="_blank" class="social-link">YouTube</a>
            <a href="https://discordapp.com/users/1137356245150470194" target="_blank" class="social-link">Discord</a>
        </div>
    </div>

    <div class="footer-text" id="footer">This website was created by Osama</div>
    
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.1;
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        const text = "This website is used for cybersecurity purposes, so please be careful when using it.";
        const container = document.getElementById('typewriter');

        function initialize() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
            document.getElementById('overlay').style.display = 'none';
            typeWriter(0);
        }

        function typeWriter(i) {
            if (i < text.length) {
                container.innerHTML += text.charAt(i);
                playClick();
                setTimeout(() => typeWriter(i + 1), 50); 
            } else {
                setTimeout(showLogo, 5000);
            }
        }

        function showLogo() {
            container.style.display = 'none';
            document.getElementById('content-wrapper').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('masons-img').style.opacity = '1';
                document.getElementById('footer').style.opacity = '1';
            }, 100);
        }
    </script>
</body>
</html>
